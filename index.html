<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koda Space</title>
    <style>
        body { background-color: #FAF4EA; color: #3E2F27; font-family: sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 28px; margin: 0 0 10px 0; }
        .subtitle { color: #B48A64; font-size: 16px; margin: 0; }
        .game-card { background: #ffffff; border: 1px solid #E9D8C4; border-radius: 16px; padding: 24px; margin-bottom: 25px; box-shadow: 0 4px 12px rgba(62, 47, 39, 0.03); overflow: hidden; }
        .game-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; display: block; }
        .game-title { font-size: 20px; margin: 0 0 10px 0; font-weight: bold; }
        .tags { margin-bottom: 15px; }
        .tag { background: #E9D8C4; color: #3E2F27; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin-right: 6px; display: inline-block; }
        .tag.secure { background: #D2E7D6; color: #1E4620; }
        .game-desc { font-size: 14px; line-height: 1.5; color: #5A4A3F; margin-bottom: 20px; }
        .btn-download { display: block; text-align: center; background: #B48A64; color: #ffffff; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Koda Space</h1>
            <p class="subtitle">Traducciones seguras y links directos</p>
        </header>
    </div>
</body>
</html>
